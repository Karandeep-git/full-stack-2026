<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 04: Multimedia & Embedding</title>
</head>

<body>

    <!-- 6. <iframe> — Embedding External Content -->
    <iframe src="https://www.wikipedia.com" width="800" height="500"></iframe>

    <!-- Embedding a YouTube Video  -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/YwtvQ23_-34?si=1OeC3BQSm4kJ8P8A"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
    </iframe>

    <!-- Embedded a Google Map -->
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d26721.24327496946!2d77.07949462557747!3d28.556984445154693!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390d1b85fc2a2d89%3A0xbef376182c43ed9d!2sIndira%20Gandhi%20International%20Airport!5e1!3m2!1sen!2sin!4v1774150471399!5m2!1sen!2sin"
        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
</body>

</html>
