<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 04: Multimedia And Embedding </title>
</head>

<body>

    <header>
        <h1>Arjun's Learning Hub</h1>
        <p>Videos, pordcasts, and Resources for lear ning web development</p>
    </header>

    <nav>
        <a href="#videos">Videos</a>
        <a href="#audio">Podcasts</a>
        <a href="#resources">Resources</a>
        <a href="#location">Location</a>
    </nav>

    <main>

        <section id="videos">
            <h2>Learning Videos</h2>

            <article>
                <h3>HTML Crash Course</h3>
                <iframe 
                width="560" 
                height="315" 
                src="https://www.youtube.com/embed/qz0aGYrrlhU"
                title="HTML Crash Course for Beginners" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen loading="lazy">
            </iframe>
            <p>A complete HTML crash course for begineers.</p>
            </article>

            <section id="#audio">
                Audio

                <h3>First Audio</h3>
                <audio 
                src="assets/audio.mp3"
                controls
                preload="none"
                ></audio>
            </section>

            <section id="resources">
                <h2>Useful Resources</h2>

                <iframe 
                src="https://developer.mozilla.org/en-US/" 
                width="100%" 
                height="400" 
                frameborder="0" 
                title="MDN Web Docs"
                loading="lazy" 
                sandbox="allow-scripts allow-same-origin">
                </iframe>
            </section>
        </section>
    </main>

</body>

</html>
